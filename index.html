<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First iPad PWA</title>
  
  <!-- Notice the "./" prefix. This ensures GitHub Pages finds it in the sub-folder -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Basic styling to make it look like an app, not a webpage -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #1d1d1f; margin-bottom: 10px; }
    p { color: #86868b; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hello iPad!</h1>
    <p>If you see this from your home screen without a browser URL bar, your PWA configuration is working perfectly.</p>
  </div>

  <script>
    // This script registers the service worker. iOS requires this to allow installation.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
